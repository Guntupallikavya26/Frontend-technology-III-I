<!DOCTYPE html>
<html>
<head>
  <title>Weather Forecast Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #74ebd5, #acb6e5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .weather-container {
      background: #ffffff;
      padding: 25px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      background: #f1f1f1;
      border-radius: 5px;
      font-size: 15px;
      min-height: 90px;
      text-align: left;
      white-space: pre-line;
    }

    .label {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="weather-container">
    <h2>Smart Weather App</h2>

    <input type="text" id="cityInput" placeholder="Enter city name" aria-label="City name" />

    <button type="button" id="getWeatherBtn">Get Weather</button>

    <div class="result" id="result" aria-live="polite">
      Weather information will appear here
    </div>
  </div>

  <script>

    async function getWeather() {
      const cityInput = document.getElementById("cityInput");
      const result = document.getElementById("result");
      const city = cityInput.value.trim();

      if (city === "") {
        result.innerText = "Please enter a city name";
        cityInput.focus();
        return;
      }

      
      result.innerText = "Loading weather data...";

     
      const apiKey = "c6202ec11d772e2ab38518d2d57fc846";
      const encodedCity = encodeURIComponent(city);
      const apiUrl = `https://api.openweathermap.org/data/2.5/weather?q=${encodedCity}&appid=${apiKey}&units=metric`;

      try {
        const response = await fetch(apiUrl);

       
        if (!response.ok) {
         
          let errData;
          try { errData = await response.json(); } catch (_) { errData = null; }
          const msg = (errData && errData.message) ? errData.message : `Error: ${response.status} ${response.statusText}`;
          result.innerText = `Could not get weather: ${msg}`;
          return;
        }

        const data = await response.json();

        
        result.innerHTML = `
          <div><span class="label">City:</span> ${data.name}, ${data.sys?.country || ''}</div>
          <div><span class="label">Temperature:</span> ${data.main?.temp ?? 'N/A'} °C</div>
          <div><span class="label">Weather:</span> ${data.weather?.[0]?.description ?? 'N/A'}</div>
          <div><span class="label">Humidity:</span> ${data.main?.humidity ?? 'N/A'}%</div>
          <div><span class="label">Wind Speed:</span> ${data.wind?.speed ?? 'N/A'} m/s</div>
        `;
      } catch (networkError) {
        
        result.innerText = "Network error while fetching weather data. Please check your connection.";
        console.error("Fetch error:", networkError);
      }
    }

   
    document.getElementById("getWeatherBtn").addEventListener("click", getWeather);

    
    document.getElementById("cityInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") getWeather();
    });
  </script>

</body>
</html>
